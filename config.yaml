# ==========================================================================
# Configuracao do Monitoramento de Rodovias - Linhas Util
# Edite livremente este arquivo. Apos editar, clique em "Atualizar agora"
# no app (ou reinicie o Streamlit).
# ==========================================================================

app:
  titulo: "Monitoramento de Rodovias - Linhas Guanabara"
  janela_dias: 7            # janela de busca de noticias (dias para tras)
  periodo_default: 1        # filtro de periodo (dias) padrao no painel
  intervalo_auto_min: 5     # auto-refresh: re-coleta a cada X minutos
  max_por_consulta: 8       # maximo de noticias por rodovia/consulta
  buscar_hubs: true         # tambem busca noticias por cidades-hub
  fetch_artigo: true        # baixa o artigo p/ resumo melhor (precisa internet)
  idioma_news: "pt-BR"
  pais_news: "BR"

# Palavras que caracterizam um "problema" na via. A noticia so e mantida se
# o titulo/resumo contiver pelo menos uma destas E uma referencia a rodovia.
palavras_problema:
  - interdicao
  - interditada
  - interditado
  - bloqueio
  - bloqueada
  - bloqueado
  - acidente
  - colisao
  - capotamento
  - tombamento
  - tombou
  - congestionamento
  - transito
  - lentidao
  - engavetamento
  - deslizamento
  - queda de barreira
  - desabamento
  - alagamento
  - alagada
  - obras
  - pista interditada
  - protesto
  - manifestacao
  - neblina
  - cratera
  - incendio
  - morre
  - feridos

